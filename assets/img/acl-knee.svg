<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" role="img" aria-labelledby="acl-title acl-desc">
  <title id="acl-title">Diagram of the knee joint showing the ACL</title>
  <desc id="acl-desc">A schematic front view of the right knee. The femur (thigh bone) is at the top, the tibia (shin bone) at the bottom, and the patella (kneecap) in front. The ACL (anterior cruciate ligament) is highlighted in rust-orange running diagonally inside the joint from the back of the femur down to the front of the tibia.</desc>

  <!-- background -->
  <rect width="500" height="500" fill="#f7faf9" rx="12"/>

  <!-- FEMUR body -->
  <rect x="185" y="30" width="130" height="160" rx="30" fill="#d6e0e0" stroke="#186b6b" stroke-width="2.5" stroke-linecap="round"/>
  <!-- femur condyles -->
  <ellipse cx="205" cy="195" rx="38" ry="28" fill="#d6e0e0" stroke="#186b6b" stroke-width="2.5"/>
  <ellipse cx="295" cy="195" rx="38" ry="28" fill="#d6e0e0" stroke="#186b6b" stroke-width="2.5"/>

  <!-- joint space -->
  <rect x="168" y="205" width="164" height="8" fill="#eef4f3"/>

  <!-- TIBIA -->
  <rect x="182" y="213" width="136" height="20" rx="6" fill="#d6e0e0" stroke="#186b6b" stroke-width="2.5"/>
  <rect x="196" y="233" width="108" height="185" rx="28" fill="#d6e0e0" stroke="#186b6b" stroke-width="2.5"/>

  <!-- FIBULA -->
  <rect x="316" y="240" width="30" height="165" rx="14" fill="#d6e0e0" stroke="#186b6b" stroke-width="2"/>

  <!-- PATELLA (kneecap) — sits in front, slightly offset for a front view schematic -->
  <ellipse cx="250" cy="178" rx="30" ry="22" fill="#eef4f3" stroke="#186b6b" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- ACL — diagonal band inside joint, highlighted in rust -->
  <!-- runs from lateral femoral condyle (back-upper) to anteromedial tibia (lower-front) -->
  <path d="M283 200 Q248 210 218 225" stroke="#c2541a" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.9"/>
  <!-- second fiber bundle to suggest ligament thickness -->
  <path d="M290 208 Q252 218 222 233" stroke="#c2541a" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.5"/>

  <!-- ---- LABELS ---- -->
  <!-- Femur label -->
  <line x1="172" y1="95" x2="135" y2="95" stroke="#3b5358" stroke-width="1.2"/>
  <text x="128" y="99" font-family="sans-serif" font-size="13" fill="#3b5358" text-anchor="end">Femur</text>
  <text x="128" y="114" font-family="sans-serif" font-size="11" fill="#607478" text-anchor="end">(thigh bone)</text>

  <!-- Patella label -->
  <line x1="222" y1="165" x2="165" y2="145" stroke="#3b5358" stroke-width="1.2"/>
  <text x="158" y="143" font-family="sans-serif" font-size="13" fill="#3b5358" text-anchor="end">Patella</text>
  <text x="158" y="158" font-family="sans-serif" font-size="11" fill="#607478" text-anchor="end">(kneecap)</text>

  <!-- ACL label -->
  <line x1="255" y1="215" x2="360" y2="185" stroke="#c2541a" stroke-width="1.2"/>
  <text x="365" y="183" font-family="sans-serif" font-size="13" fill="#c2541a" text-anchor="start" font-weight="600">ACL</text>
  <text x="365" y="198" font-family="sans-serif" font-size="11" fill="#c2541a" text-anchor="start">(anterior cruciate</text>
  <text x="365" y="212" font-family="sans-serif" font-size="11" fill="#c2541a" text-anchor="start">ligament)</text>

  <!-- Tibia label -->
  <line x1="305" y1="310" x2="365" y2="310" stroke="#3b5358" stroke-width="1.2"/>
  <text x="370" y="314" font-family="sans-serif" font-size="13" fill="#3b5358" text-anchor="start">Tibia</text>
  <text x="370" y="329" font-family="sans-serif" font-size="11" fill="#607478" text-anchor="start">(shin bone)</text>

  <!-- Fibula label -->
  <line x1="330" y1="380" x2="375" y2="380" stroke="#3b5358" stroke-width="1.2"/>
  <text x="380" y="384" font-family="sans-serif" font-size="13" fill="#3b5358" text-anchor="start">Fibula</text>

  <!-- Joint space label -->
  <line x1="168" y1="209" x2="118" y2="230" stroke="#3b5358" stroke-width="1"/>
  <text x="112" y="234" font-family="sans-serif" font-size="11" fill="#607478" text-anchor="end">joint space</text>

  <!-- caption area -->
  <text x="250" y="465" font-family="sans-serif" font-size="12" fill="#607478" text-anchor="middle">Right knee — front view (schematic)</text>
  <text x="250" y="481" font-family="sans-serif" font-size="12" fill="#c2541a" text-anchor="middle">ACL highlighted in orange</text>
</svg>
